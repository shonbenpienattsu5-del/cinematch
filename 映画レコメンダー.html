<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CineMatch</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a12;
  --surface:#14141f;
  --surface2:#1e1e2e;
  --surface3:#28283c;
  --accent:#e94560;
  --gold:#f5c842;
  --text:#f0f0f0;
  --text2:#888;
  --prime:#00a8e1;
  --unext:#ff3366;
  --netflix:#e50914;
  --r:12px;
  --nav:60px;
  --hdr:56px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;
  font-size:14px;
  line-height:1.5;
}
#app{display:flex;flex-direction:column;height:100vh}

/* HEADER */
#header{
  height:var(--hdr);background:var(--surface);
  border-bottom:1px solid #2a2a3e;
  display:flex;align-items:center;padding:0 14px;gap:10px;
  flex-shrink:0;position:sticky;top:0;z-index:100;
}
#logo{font-size:17px;font-weight:700;color:var(--accent);white-space:nowrap}
#svc-filter{display:flex;gap:6px;flex:1;justify-content:flex-end;flex-wrap:nowrap}
.sf-btn{
  padding:5px 10px;border:1px solid var(--surface3);
  background:transparent;color:var(--text2);border-radius:20px;
  cursor:pointer;font-size:12px;transition:all .2s;white-space:nowrap;
}
.sf-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.sf-btn:hover:not(.active){border-color:var(--text2);color:var(--text)}

/* CONTENT */
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
#bottom-nav{
  height:calc(var(--nav) + var(--safe-b));
  padding-bottom:var(--safe-b);
  background:var(--surface);border-top:1px solid #2a2a3e;
  display:flex;flex-shrink:0;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:2px;background:transparent;border:none;
  color:var(--text2);cursor:pointer;font-size:10px;transition:color .2s;
}
.nav-btn .ic{font-size:22px}
.nav-btn.active{color:var(--accent)}
.nav-btn:hover:not(.active){color:var(--text)}

/* SUB TABS */
#sub-tabs{
  display:flex;overflow-x:auto;scrollbar-width:none;
  padding:10px 14px 0;gap:7px;
  background:var(--surface);border-bottom:1px solid #2a2a3e;
  flex-shrink:0;
}
#sub-tabs::-webkit-scrollbar{display:none}
.sub-tab{
  padding:5px 13px;border:1px solid var(--surface3);
  background:transparent;color:var(--text2);border-radius:20px;
  cursor:pointer;font-size:12px;white-space:nowrap;transition:all .2s;
}
.sub-tab.active{background:var(--surface3);color:var(--text)}
.sub-tab:hover:not(.active){color:var(--text)}

/* MOVIE GRID */
.movie-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:14px;padding:14px;
}
@media(min-width:600px){
  .movie-grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:18px;padding:18px}
}
@media(min-width:900px){
  .movie-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:22px;padding:22px}
}

.movie-card{
  background:var(--surface);border-radius:var(--r);overflow:hidden;
  cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;
}
.movie-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(233,69,96,.25)}
.movie-card:active{transform:scale(.97)}
.movie-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--surface2)}
.no-poster{
  width:100%;aspect-ratio:2/3;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;font-size:44px;color:var(--surface3)
}
.card-info{padding:7px 9px 9px}
.card-title{
  font-size:12px;font-weight:600;margin-bottom:3px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden
}
.card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.card-year{font-size:11px;color:var(--text2)}
.card-rating{font-size:11px;color:var(--gold)}
.badges{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.badge{font-size:10px;padding:2px 5px;border-radius:4px;font-weight:600}
.b-prime{background:var(--prime);color:#fff}
.b-unext{background:var(--unext);color:#fff}
.b-netflix{background:var(--netflix);color:#fff}
.b-other{background:var(--surface3);color:var(--text2)}
.wl-btn{
  position:absolute;top:6px;right:6px;width:28px;height:28px;
  border-radius:50%;background:rgba(0,0,0,.65);border:none;
  color:#fff;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.wl-btn.saved{color:var(--accent)}
.wl-btn:active{transform:scale(1.2)}

/* LOADING / EMPTY / ERROR */
.loading{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:60px 20px;gap:14px;color:var(--text2)
}
.spinner{
  width:38px;height:38px;border:3px solid var(--surface3);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty .ei{font-size:44px;margin-bottom:10px}
.err{
  background:#2a1520;border:1px solid var(--accent);color:var(--accent);
  border-radius:var(--r);padding:12px 14px;margin:14px;font-size:13px
}

/* SEARCH */
.search-wrap{padding:14px;background:var(--bg);position:sticky;top:0;z-index:10}
.search-input{
  width:100%;padding:10px 16px;background:var(--surface);
  border:1px solid var(--surface3);border-radius:24px;
  color:var(--text);font-size:14px;outline:none;transition:border-color .2s;
}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text2)}

/* MODAL */
#modal-ov{
  position:fixed;inset:0;background:rgba(0,0,0,.88);
  z-index:200;display:none;overflow-y:auto;-webkit-overflow-scrolling:touch;
}
#modal-ov.open{display:block}
#modal-box{
  background:var(--surface);border-radius:16px 16px 0 0;
  min-height:65vh;margin-top:48px;padding-bottom:calc(32px + var(--safe-b));
  position:relative;
}
@media(min-width:600px){
  #modal-box{max-width:560px;margin:48px auto 32px;border-radius:16px}
}
#m-close{
  position:absolute;top:10px;right:10px;width:32px;height:32px;
  border-radius:50%;background:rgba(255,255,255,.12);border:none;
  color:#fff;font-size:18px;cursor:pointer;z-index:10;
  display:flex;align-items:center;justify-content:center;
}
#m-close:hover{background:rgba(255,255,255,.22)}
.m-backdrop{width:100%;height:190px;object-fit:cover;display:block;border-radius:16px 16px 0 0}
@media(min-width:600px){.m-backdrop{border-radius:16px 16px 0 0}}
.m-body{padding:14px}
.m-title{font-size:19px;font-weight:700;margin-bottom:3px}
.m-orig{font-size:12px;color:var(--text2);margin-bottom:8px}
.m-meta{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.m-rating{color:var(--gold);font-size:14px;font-weight:600}
.m-year,.m-rt{color:var(--text2);font-size:13px}
.m-genres{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.gtag{padding:3px 9px;border-radius:12px;background:var(--surface2);color:var(--text2);font-size:11px}
.m-ov{font-size:13px;line-height:1.75;color:var(--text);margin-bottom:14px}
.m-sec{margin-bottom:14px}
.m-sec-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.m-providers{display:flex;gap:7px;flex-wrap:wrap}
.p-badge{
  display:flex;align-items:center;gap:6px;
  padding:5px 10px;border-radius:8px;background:var(--surface2);font-size:12px;
}
.p-logo{width:20px;height:20px;border-radius:4px}
.cast-list{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.cast-list::-webkit-scrollbar{display:none}
.cast-item{flex-shrink:0;text-align:center;width:58px}
.cast-img{
  width:58px;height:58px;border-radius:50%;object-fit:cover;
  background:var(--surface2);margin-bottom:4px;display:block;
}
.cast-name{font-size:10px;color:var(--text2);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.m-actions{display:flex;gap:9px;margin-top:14px}
.act-btn{
  flex:1;padding:10px;border-radius:8px;border:none;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;
}
.btn-wl{background:var(--surface2);color:var(--text)}
.btn-wl.on{background:var(--accent);color:#fff}
.btn-wl:active{opacity:.8}
.rating-row{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.r-label{font-size:12px;color:var(--text2)}
.stars{display:flex;gap:3px}
.star{font-size:26px;cursor:pointer;color:var(--surface3);transition:color .1s;line-height:1}
.star.on{color:var(--gold)}

/* SETTINGS */
.set-sec{padding:18px 14px;border-bottom:1px solid var(--surface2)}
.set-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.set-input{
  width:100%;padding:10px 14px;background:var(--surface);
  border:1px solid var(--surface3);border-radius:8px;
  color:var(--text);font-size:13px;outline:none;font-family:monospace;
}
.set-input:focus{border-color:var(--accent)}
.set-btn{
  padding:8px 16px;border-radius:8px;border:none;
  background:var(--accent);color:#fff;font-size:13px;
  cursor:pointer;margin-top:9px;transition:opacity .2s;
}
.set-btn:hover{opacity:.85}
.set-btn.d{background:var(--surface2);color:var(--text2)}
.set-note{font-size:11px;color:var(--text2);margin-top:6px;line-height:1.6}
</style>
</head>
<body>
<div id="app">
  <header id="header">
    <div id="logo">🎬 CineMatch</div>
    <div id="svc-filter">
      <button class="sf-btn active" onclick="setSvc('all')">すべて</button>
      <button class="sf-btn" onclick="setSvc('prime')">▶ Prime</button>
      <button class="sf-btn" onclick="setSvc('unext')">U-NEXT</button>
    </div>
  </header>
  <div id="content"></div>
  <nav id="bottom-nav">
    <button class="nav-btn active" onclick="goTab('recommend')" id="nav-recommend"><span class="ic">🎬</span><span>おすすめ</span></button>
    <button class="nav-btn" onclick="goTab('search')" id="nav-search"><span class="ic">🔍</span><span>検索</span></button>
    <button class="nav-btn" onclick="goTab('mylist')" id="nav-mylist"><span class="ic">❤️</span><span>マイリスト</span></button>
    <button class="nav-btn" onclick="goTab('settings')" id="nav-settings"><span class="ic">⚙️</span><span>設定</span></button>
  </nav>
</div>

<div id="modal-ov" onclick="ovClick(event)">
  <div id="modal-box">
    <button id="m-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
var API_KEY = 'e051152fe4661315d4510279a1778530';
var BASE = 'https://api.themoviedb.org/3';
var IW = 'https://image.tmdb.org/t/p/w342';
var IB = 'https://image.tmdb.org/t/p/w780';
var IL = 'https://image.tmdb.org/t/p/original';

var PROV = {
  prime: {ids: [9, 119, 10, 337], label: 'Amazon Prime', color: '#00a8e1'},
  unext: {ids: [39], label: 'U-NEXT', color: '#ff3366'},
  netflix: {ids: [8, 213], label: 'Netflix', color: '#e50914'},
};

var SUB_TABS = [
  {id:'recommend', label:'おすすめ'},
  {id:'streaming', label:'📺 配信中'},
  {id:'nolan',     label:'🎬 ノーラン'},
  {id:'action',    label:'💥 アクション'},
  {id:'sf',        label:'🚀 SF'},
  {id:'statham',   label:'スタサム'},
  {id:'cruise',    label:'クルーズ'},
  {id:'willis',    label:'ウィリス'},
  {id:'japan',     label:'🇯🇵 日本映画'},
];

var S = {
  tab: 'recommend',
  sub: 'recommend',
  svc: 'all',
  movies: [],
  provCache: {},
  searchRes: [],
  myList: [],
  ratings: {},
  loading: false,
  err: null,
  query: '',
  timer: null,
};

function load() {
  try { S.myList = JSON.parse(localStorage.getItem('cm_list') || '[]'); } catch(e) { S.myList = []; }
  try { S.ratings = JSON.parse(localStorage.getItem('cm_ratings') || '{}'); } catch(e) { S.ratings = {}; }
  var savedKey = localStorage.getItem('cm_key');
  if (savedKey) API_KEY = savedKey;
}

function apiGet(path, params) {
  var url = BASE + path + '?api_key=' + API_KEY + '&language=ja-JP';
  if (params) {
    var ks = Object.keys(params);
    for (var i = 0; i < ks.length; i++) {
      if (params[ks[i]] != null) {
        url += '&' + ks[i] + '=' + encodeURIComponent(params[ks[i]]);
      }
    }
  }
  return fetch(url).then(function(r) {
    if (!r.ok) throw new Error('APIエラー ' + r.status);
    return r.json();
  });
}

function getProviders(movieId) {
  if (S.provCache[movieId] !== undefined) return Promise.resolve(S.provCache[movieId]);
  return apiGet('/movie/' + movieId + '/watch/providers').then(function(d) {
    var jp = ((d.results || {}).JP) || {};
    var all = (jp.flatrate || []).concat(jp.free || []);
    S.provCache[movieId] = all;
    return all;
  }).catch(function() {
    S.provCache[movieId] = [];
    return [];
  });
}

function fetchMovies(sub) {
  var p = {
    sort_by: 'popularity.desc',
    'vote_count.gte': 80,
    without_genres: '27',
    watch_region: 'JP',
    page: 1,
  };
  if (sub === 'nolan') {
    p.with_people = '525';
    p['vote_count.gte'] = 200;
    p.sort_by = 'vote_average.desc';
  } else if (sub === 'statham') {
    p.with_cast = '18269';
  } else if (sub === 'cruise') {
    p.with_cast = '500';
  } else if (sub === 'willis') {
    p.with_cast = '62';
  } else if (sub === 'action') {
    p.with_genres = '28';
  } else if (sub === 'sf') {
    p.with_genres = '878';
  } else if (sub === 'streaming') {
    p.with_watch_providers = PROV.prime.ids.concat(PROV.unext.ids).join('|');
    p.with_genres = '28|878|53';
  } else if (sub === 'japan') {
    p.with_original_language = 'ja';
    p.without_genres = '27|16';
    p.sort_by = 'popularity.desc';
  } else {
    p.with_genres = '28|878|53';
    p.with_original_language = 'en|ja|ko';
  }
  return apiGet('/discover/movie', p).then(function(d) { return d.results || []; });
}

// ===== RENDER =====
function render() {
  var el = document.getElementById('content');
  if (S.tab === 'recommend') el.innerHTML = renderRec();
  else if (S.tab === 'search')   el.innerHTML = renderSearch();
  else if (S.tab === 'mylist')   el.innerHTML = renderMyList();
  else if (S.tab === 'settings') el.innerHTML = renderSettings();

  if (S.tab === 'search') {
    var inp = document.getElementById('search-input');
    if (inp && !inp.value) { inp.focus(); }
    if (inp && S.query) inp.value = S.query;
  }
}

function renderRec() {
  var h = '<div id="sub-tabs">';
  for (var i = 0; i < SUB_TABS.length; i++) {
    var t = SUB_TABS[i];
    h += '<button class="sub-tab' + (S.sub === t.id ? ' active' : '') + '" onclick="goSub(\'' + t.id + '\')">' + t.label + '</button>';
  }
  h += '</div>';
  if (S.loading) return h + '<div class="loading"><div class="spinner"></div><div>読み込み中...</div></div>';
  if (S.err)     return h + '<div class="err">⚠️ ' + esc(S.err) + '</div>';
  var ms = svcFilter(S.movies);
  if (!ms.length) return h + '<div class="empty"><div class="ei">🎬</div><div>映画が見つかりませんでした</div></div>';
  h += '<div class="movie-grid">';
  for (var j = 0; j < ms.length; j++) h += renderCard(ms[j]);
  h += '</div>';
  return h;
}

function renderSearch() {
  var h = '<div class="search-wrap"><input id="search-input" class="search-input" type="search" placeholder="映画タイトルで検索..." oninput="onSearch(this.value)" /></div>';
  if (!S.query) return h + '<div class="empty"><div class="ei">🔍</div><div>映画タイトルを入力してください</div></div>';
  if (S.loading) return h + '<div class="loading"><div class="spinner"></div><div>検索中...</div></div>';
  var ms = svcFilter(S.searchRes);
  if (!ms.length) return h + '<div class="empty"><div class="ei">😢</div><div>「' + esc(S.query) + '」が見つかりませんでした</div></div>';
  h += '<div class="movie-grid">';
  for (var i = 0; i < ms.length; i++) h += renderCard(ms[i]);
  h += '</div>';
  return h;
}

function renderMyList() {
  if (!S.myList.length) {
    return '<div class="empty"><div class="ei">❤️</div><div>マイリストに映画を追加しましょう</div><div style="font-size:12px;color:#555;margin-top:6px">映画の ♡ をタップ</div></div>';
  }
  var all = S.movies.concat(S.searchRes);
  var found = [];
  var seen = {};
  for (var i = 0; i < all.length; i++) {
    var m = all[i];
    if (S.myList.indexOf(m.id) !== -1 && !seen[m.id]) {
      found.push(m);
      seen[m.id] = true;
    }
  }
  if (!found.length) {
    return '<div class="empty"><div class="ei">❤️</div><div>' + S.myList.length + '件のマイリスト<br><span style="font-size:12px;color:#555">おすすめタブから映画を表示するとここに表示されます</span></div></div>';
  }
  var h = '<div class="movie-grid">';
  for (var j = 0; j < found.length; j++) h += renderCard(found[j]);
  h += '</div>';
  return h;
}

function renderSettings() {
  return '<div class="set-sec">'
    + '<div class="set-title">TMDB APIキー</div>'
    + '<input class="set-input" id="set-key" type="text" value="' + esc(API_KEY) + '" />'
    + '<br><button class="set-btn" onclick="saveKey()">保存</button>'
    + '<div class="set-note">TMDB アカウント設定 → API から取得できます</div>'
    + '</div>'
    + '<div class="set-sec">'
    + '<div class="set-title">あなたの好み設定</div>'
    + '<div style="font-size:13px;color:#aaa;line-height:2">'
    + '🎬 好きな監督：クリストファー・ノーラン<br>'
    + '🎭 好きな俳優：J・ステイサム / B・ウィリス / T・クルーズ<br>'
    + '🎭 好きなジャンル：アクション / SF<br>'
    + '🌐 対応言語：英語 / 日本語 / 韓国語'
    + '</div>'
    + '</div>'
    + '<div class="set-sec">'
    + '<div class="set-title">データ管理</div>'
    + '<div style="font-size:13px;color:#888;margin-bottom:8px">マイリスト: ' + S.myList.length + '件　評価済み: ' + Object.keys(S.ratings).length + '件</div>'
    + '<button class="set-btn d" onclick="clearAll()">すべてのデータをリセット</button>'
    + '</div>'
    + '<div class="set-sec">'
    + '<div class="set-title">CineMatch について</div>'
    + '<div style="font-size:12px;color:#555;line-height:1.8">データ提供: The Movie Database (TMDB)<br>バージョン 1.0</div>'
    + '</div>';
}

function renderCard(m) {
  var saved = S.myList.indexOf(m.id) !== -1;
  var poster = m.poster_path ? (IW + m.poster_path) : '';
  var year = m.release_date ? m.release_date.slice(0,4) : '';
  var rat = m.vote_average ? ('★ ' + m.vote_average.toFixed(1)) : '';
  var provs = S.provCache[m.id] || [];

  var h = '<div class="movie-card" onclick="openMovie(' + m.id + ')">';
  if (poster) {
    h += '<img class="movie-poster" src="' + poster + '" alt="' + esc(m.title) + '" loading="lazy">';
  } else {
    h += '<div class="no-poster">🎬</div>';
  }
  h += '<button class="wl-btn' + (saved ? ' saved' : '') + '" onclick="toggleWL(event,' + m.id + ')">' + (saved ? '♥' : '♡') + '</button>';
  h += '<div class="card-info">';
  h += '<div class="card-title">' + esc(m.title || m.original_title) + '</div>';
  h += '<div class="card-meta">';
  if (year) h += '<span class="card-year">' + year + '</span>';
  if (rat)  h += '<span class="card-rating">' + rat + '</span>';
  h += '</div>';
  if (provs.length) {
    h += '<div class="badges">';
    var shown = {};
    for (var i = 0; i < provs.length && Object.keys(shown).length < 3; i++) {
      var pid = provs[i].provider_id;
      if (shown[pid]) continue;
      shown[pid] = true;
      if (PROV.prime.ids.indexOf(pid) !== -1) h += '<span class="badge b-prime">Prime</span>';
      else if (PROV.unext.ids.indexOf(pid) !== -1) h += '<span class="badge b-unext">U-NEXT</span>';
      else if (PROV.netflix.ids.indexOf(pid) !== -1) h += '<span class="badge b-netflix">Netflix</span>';
      else h += '<span class="badge b-other">' + esc(provs[i].provider_name) + '</span>';
    }
    h += '</div>';
  }
  h += '</div></div>';
  return h;
}

// ===== MODAL =====
function openMovie(id) {
  var ov = document.getElementById('modal-ov');
  ov.classList.add('open');
  ov.scrollTop = 0;
  document.getElementById('modal-content').innerHTML = '<div class="loading" style="padding:48px"><div class="spinner"></div></div>';
  Promise.all([
    apiGet('/movie/' + id, {append_to_response: 'credits'}),
    getProviders(id),
  ]).then(function(res) {
    var m = res[0];
    var provs = res[1];
    document.getElementById('modal-content').innerHTML = renderModal(m, provs);
    showStars(S.ratings[id] || 0);
  }).catch(function(e) {
    document.getElementById('modal-content').innerHTML = '<div class="err" style="margin:20px">読み込みに失敗しました: ' + esc(e.message) + '</div>';
  });
}

function renderModal(m, provs) {
  var saved = S.myList.indexOf(m.id) !== -1;
  var backdrop = m.backdrop_path ? (IB + m.backdrop_path) : (m.poster_path ? (IW + m.poster_path) : '');
  var year = m.release_date ? m.release_date.slice(0,4) : '';
  var rat = m.vote_average ? ('★ ' + m.vote_average.toFixed(1)) : '';
  var rt = m.runtime ? (Math.floor(m.runtime/60) + 'h ' + (m.runtime%60) + 'm') : '';
  var genres = (m.genres || []).map(function(g){ return '<span class="gtag">' + esc(g.name) + '</span>'; }).join('');

  var h = '';
  if (backdrop) h += '<img class="m-backdrop" src="' + backdrop + '" alt="">';

  h += '<div class="m-body">';
  h += '<div class="m-title">' + esc(m.title || m.original_title) + '</div>';
  if (m.original_title && m.original_title !== m.title) {
    h += '<div class="m-orig">' + esc(m.original_title) + '</div>';
  }
  h += '<div class="m-meta">';
  if (rat) h += '<span class="m-rating">' + rat + '</span>';
  if (year) h += '<span class="m-year">' + year + '</span>';
  if (rt)  h += '<span class="m-rt">⏱ ' + rt + '</span>';
  h += '</div>';
  if (genres) h += '<div class="m-genres">' + genres + '</div>';
  if (m.overview) h += '<div class="m-ov">' + esc(m.overview) + '</div>';

  // Streaming
  h += '<div class="m-sec"><div class="m-sec-title">配信サービス</div>';
  if (provs && provs.length) {
    h += '<div class="m-providers">';
    var sp = {};
    for (var i = 0; i < provs.length; i++) {
      var p = provs[i];
      if (sp[p.provider_id]) continue;
      sp[p.provider_id] = true;
      var logo = p.logo_path ? (IL + p.logo_path) : '';
      h += '<div class="p-badge">';
      if (logo) h += '<img class="p-logo" src="' + logo + '" alt="">';
      h += '<span>' + esc(p.provider_name) + '</span></div>';
    }
    h += '</div>';
  } else {
    h += '<div style="color:#555;font-size:13px">日本での配信情報なし</div>';
  }
  h += '</div>';

  // Cast
  var cast = ((m.credits || {}).cast || []).slice(0, 10);
  if (cast.length) {
    h += '<div class="m-sec"><div class="m-sec-title">キャスト</div><div class="cast-list">';
    for (var c = 0; c < cast.length; c++) {
      var a = cast[c];
      var aimg = a.profile_path ? ('https://image.tmdb.org/t/p/w138_and_h175_face' + a.profile_path) : '';
      h += '<div class="cast-item">';
      if (aimg) h += '<img class="cast-img" src="' + aimg + '" alt="' + esc(a.name) + '">';
      else       h += '<div class="cast-img" style="display:flex;align-items:center;justify-content:center;font-size:22px">👤</div>';
      h += '<div class="cast-name">' + esc(a.name) + '</div></div>';
    }
    h += '</div></div>';
  }

  // Director
  var dirs = ((m.credits || {}).crew || []).filter(function(x){ return x.job === 'Director'; });
  if (dirs.length) {
    h += '<div class="m-sec"><div class="m-sec-title">監督</div><div style="font-size:13px">' + dirs.map(function(d){ return esc(d.name); }).join('、') + '</div></div>';
  }

  // Actions
  h += '<div class="m-actions">';
  h += '<button class="act-btn btn-wl' + (saved ? ' on' : '') + '" id="m-wl-btn" onclick="toggleWLModal(' + m.id + ')">' + (saved ? '❤️ マイリスト済み' : '🤍 マイリストに追加') + '</button>';
  h += '</div>';

  // Rating
  h += '<div class="rating-row"><span class="r-label">あなたの評価：</span><div class="stars" id="star-area">';
  for (var s = 1; s <= 5; s++) {
    h += '<span class="star" onclick="setRating(' + m.id + ',' + s + ')" data-v="' + s + '">★</span>';
  }
  h += '</div></div>';

  h += '</div>';
  return h;
}

function showStars(n) {
  var ss = document.querySelectorAll('.star');
  for (var i = 0; i < ss.length; i++) {
    ss[i].classList.toggle('on', parseInt(ss[i].getAttribute('data-v')) <= n);
  }
}

function setRating(id, n) {
  S.ratings[id] = n;
  localStorage.setItem('cm_ratings', JSON.stringify(S.ratings));
  showStars(n);
}

function closeModal() { document.getElementById('modal-ov').classList.remove('open'); }
function ovClick(e) { if (e.target === document.getElementById('modal-ov')) closeModal(); }

function toggleWLModal(id) {
  _toggleWL(id);
  var btn = document.getElementById('m-wl-btn');
  var on = S.myList.indexOf(id) !== -1;
  if (btn) { btn.textContent = on ? '❤️ マイリスト済み' : '🤍 マイリストに追加'; btn.classList.toggle('on', on); }
}

// ===== ACTIONS =====
function toggleWL(e, id) {
  e.stopPropagation();
  _toggleWL(id);
  var on = S.myList.indexOf(id) !== -1;
  e.target.textContent = on ? '♥' : '♡';
  e.target.classList.toggle('saved', on);
}

function _toggleWL(id) {
  var i = S.myList.indexOf(id);
  if (i === -1) S.myList.push(id); else S.myList.splice(i,1);
  localStorage.setItem('cm_list', JSON.stringify(S.myList));
}

function setSvc(svc) {
  S.svc = svc;
  document.querySelectorAll('.sf-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('onclick').indexOf("'" + svc + "'") !== -1);
  });
  render();
}

function svcFilter(ms) {
  if (S.svc === 'all') return ms;
  var ids = PROV[S.svc] ? PROV[S.svc].ids : [];
  return ms.filter(function(m) {
    var ps = S.provCache[m.id];
    if (!ps) return false;
    return ps.some(function(p) { return ids.indexOf(p.provider_id) !== -1; });
  });
}

function onSearch(val) {
  S.query = val;
  if (S.timer) clearTimeout(S.timer);
  if (!val) { S.searchRes = []; render(); return; }
  S.loading = true; render();
  S.timer = setTimeout(function() {
    apiGet('/search/movie', {query: val, watch_region: 'JP'}).then(function(d) {
      S.searchRes = d.results || [];
      S.loading = false;
      render();
      S.searchRes.slice(0,10).forEach(function(m){ getProviders(m.id).then(function(){ render(); }); });
    }).catch(function(e) {
      S.loading = false; S.err = e.message; render();
    });
  }, 400);
}

function goTab(tab) {
  S.tab = tab; S.err = null;
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  var nb = document.getElementById('nav-' + tab);
  if (nb) nb.classList.add('active');
  if (tab === 'recommend' && !S.movies.length) loadMovies();
  else render();
}

function goSub(sub) {
  S.sub = sub; S.movies = []; loadMovies();
}

function loadMovies() {
  S.loading = true; S.err = null; render();
  fetchMovies(S.sub).then(function(ms) {
    S.movies = ms; S.loading = false; render();
    var queue = ms.slice(0, 20).map(function(m){ return m.id; });
    var batch = 0;
    function next() {
      if (!queue.length) { render(); return; }
      var id = queue.shift();
      getProviders(id).then(function() {
        batch++;
        if (batch % 5 === 0) render();
        setTimeout(next, 60);
      }).catch(function(){ setTimeout(next, 60); });
    }
    next();
  }).catch(function(e) {
    S.loading = false; S.err = e.message; render();
  });
}

function saveKey() {
  var k = (document.getElementById('set-key') || {}).value;
  if (k && k.trim()) { API_KEY = k.trim(); localStorage.setItem('cm_key', API_KEY); alert('APIキーを保存しました'); }
}

function clearAll() {
  if (!confirm('マイリストと評価データをすべて削除しますか？')) return;
  localStorage.removeItem('cm_list');
  localStorage.removeItem('cm_ratings');
  S.myList = []; S.ratings = {};
  render();
}

function esc(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// INIT
load();
loadMovies();
</script>
</body>
</html>
