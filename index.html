<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CineMatch</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060810;--s1:#0a0f1e;--s2:#111829;--s3:#182237;--s4:#1f2d4a;
  --gold:#c9a227;--gold2:#f0c840;--text:#f0e8d5;--t2:#8499b8;--t3:#3d4f6a;
  --prime:#1299cc;--unext:#cc1e4a;--nflx:#b81414;--tver:#0099e0;--stage:#2a8f5a;--hulu:#40b87c;
  --r:10px;--nav:58px;--safe:env(safe-area-inset-bottom,0px);
  --hdr:52px;--top:calc(56px + env(safe-area-inset-top,0px));
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;font-size:14px}
#app{display:flex;flex-direction:column;height:100vh}
#hdr{height:var(--top);position:fixed;top:0;left:0;right:0;z-index:100;background:linear-gradient(to bottom,rgba(6,8,16,.98) 75%,transparent);display:flex;align-items:flex-end;padding:0 14px 10px;gap:10px}
#logo{display:flex;align-items:center;gap:5px}
#logo-icon{font-size:20px}
#logo-text{font-size:16px;font-weight:900;letter-spacing:2.5px;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#hdr-right{display:flex;gap:8px;margin-left:auto}
.hdr-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.08);border:none;color:var(--text);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-top:var(--top);padding-bottom:calc(var(--nav) + var(--safe))}
#bnav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav) + var(--safe));padding-bottom:var(--safe);background:linear-gradient(to top,rgba(6,8,16,.98) 80%,transparent);display:flex;z-index:100;border-top:1px solid rgba(255,255,255,.05)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:transparent;border:none;color:var(--t2);cursor:pointer;font-size:10px;padding:4px 0;transition:color .2s}
.nb .ni{font-size:21px;line-height:1}
.nb.on{color:var(--gold)}
.tab-content{display:none}.tab-content.active{display:block}
#hero-wrap{position:relative;width:100%;height:60vw;min-height:260px;max-height:420px;overflow:hidden;background:var(--s2);margin-bottom:4px}
#hero-wrap img.hbg{width:100%;height:100%;object-fit:cover;display:block}
.hgrad{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(6,8,16,.5) 45%,transparent 100%)}
.hinfo{position:absolute;bottom:0;left:0;right:0;padding:10px 14px 14px}
.hbadge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;margin-bottom:6px;letter-spacing:.5px}
.hb-t{background:var(--stage);color:#fff}.hb-r{background:rgba(201,162,39,.2);color:var(--gold);border:1px solid rgba(201,162,39,.35)}
.htitle{font-size:21px;font-weight:800;line-height:1.2;margin-bottom:5px;text-shadow:0 2px 10px rgba(0,0,0,.9)}
.hmeta{display:flex;gap:8px;align-items:center;margin-bottom:10px;font-size:12px;color:var(--t2)}
.hrat{color:var(--gold);font-weight:700;font-size:13px}
.hbtns{display:flex;gap:7px}
.hbtn{padding:7px 14px;border-radius:6px;border:none;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px}
.hbtn-p{background:var(--gold);color:#000}.hbtn-i{background:rgba(255,255,255,.15);color:var(--text);border:1px solid rgba(255,255,255,.2)}
.hbtn-w{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none}
.hdots{position:absolute;bottom:5px;right:14px;display:flex;gap:4px}
.hdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.3);transition:all .3s}
.hdot.on{width:14px;border-radius:3px;background:var(--gold)}
.section{margin-bottom:2px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px}
.sec-title{font-size:15px;font-weight:700}
.sec-action{font-size:12px;color:var(--t2);cursor:pointer}
#sec-pick .sec-title{color:var(--gold);font-size:16px}
.row{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding:0 14px 8px}
.row::-webkit-scrollbar{display:none}
.card{flex-shrink:0;width:118px;cursor:pointer;position:relative;border-radius:var(--r);overflow:hidden;background:var(--s2);transition:transform .18s}
.card:active{transform:scale(.95)}.card:hover{transform:scale(1.04)}
@media(min-width:500px){.card{width:145px}}
.c-img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--s3)}
.c-np{width:100%;aspect-ratio:2/3;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:34px}
.c-ov{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(6,8,16,.97) 0%,rgba(6,8,16,.6) 55%,transparent 100%);padding:18px 7px 7px}
.c-title{font-size:11px;font-weight:600;line-height:1.3;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.c-meta{display:flex;align-items:center;justify-content:space-between}
.c-rat{font-size:11px;color:var(--gold);font-weight:700}.c-yr{font-size:10px;color:var(--t2)}
.c-bgs{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.cbg{font-size:9px;padding:1px 4px;border-radius:3px;font-weight:700;white-space:nowrap}
.cbg-p{background:var(--prime);color:#fff}.cbg-u{background:var(--unext);color:#fff}
.cbg-n{background:var(--nflx);color:#fff}.cbg-t{background:var(--stage);color:#fff}
.cbg-a{background:#7b2d8b;color:#fff}.cbg-d{background:var(--s4);color:var(--t2)}
.cbg-g{background:var(--gold);color:#000}.cbg-h{background:var(--hulu);color:#fff}
.cbg-s{background:rgba(201,162,39,.22);color:var(--gold);border:1px solid rgba(201,162,39,.4)}
.cwl{position:absolute;top:5px;right:5px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.6);border:none;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2}
.cwl.on{color:var(--gold)}
.cqw{position:absolute;top:5px;left:5px;width:22px;height:22px;border-radius:50%;border:none;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:background .2s}
.cqw-off{background:rgba(0,0,0,.45);color:rgba(255,255,255,.6)}
.cqw-on{background:rgba(42,143,90,.9);color:#fff}
.skel-row{display:flex;gap:10px;padding:0 14px 8px;overflow:hidden}
.skel-c{flex-shrink:0;width:118px;aspect-ratio:2/3;border-radius:var(--r);background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shim 1.5s infinite}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
.tonight-skel{height:180px;margin:0 14px;border-radius:12px;background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shim 1.5s infinite}
.tv-banner{display:flex;align-items:center;gap:12px;margin:0 14px 8px;padding:11px 13px;background:linear-gradient(135deg,var(--s2),var(--s3));border-radius:var(--r);border:1px solid rgba(255,255,255,.07);cursor:pointer;text-decoration:none;transition:border-color .2s}
.tv-banner:hover{border-color:var(--gold)}
.tv-logo{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;color:#fff;flex-shrink:0;text-align:center;line-height:1.3}
.tv-text h3{font-size:13px;font-weight:700;margin-bottom:2px;color:var(--text)}
.tv-text p{font-size:11px;color:var(--t2);line-height:1.4}
#modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:none;overflow-y:auto;-webkit-overflow-scrolling:touch}
#modal-ov.open{display:block}
#modal-box{background:var(--s1);border-radius:16px 16px 0 0;min-height:70vh;margin-top:44px;padding-bottom:calc(40px + var(--safe));position:relative}
@media(min-width:600px){#modal-box{max-width:580px;margin:44px auto 32px;border-radius:16px}}
#m-close{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:var(--text);font-size:16px;cursor:pointer;z-index:5;display:flex;align-items:center;justify-content:center}
.m-back{width:100%;height:195px;object-fit:cover;display:block;border-radius:16px 16px 0 0}
.m-body{padding:13px 14px}
.m-tbadge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;margin-bottom:8px}
.m-title{font-size:19px;font-weight:800;margin-bottom:2px;line-height:1.2}
.m-orig{font-size:12px;color:var(--t2);margin-bottom:7px}
.m-meta{display:flex;gap:9px;align-items:center;margin-bottom:9px;flex-wrap:wrap}
.m-rat{color:var(--gold);font-weight:700;font-size:14px}
.m-yr,.m-rt{color:var(--t2);font-size:12px}
.m-genres{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:11px}
.gtag{padding:3px 9px;border-radius:12px;background:var(--s3);color:var(--t2);font-size:11px}
.m-ov{font-size:13px;line-height:1.75;color:var(--text);margin-bottom:13px}
.m-sec{margin-bottom:13px}
.m-sec-t{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.m-acts{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap}
.mbtn{padding:9px 13px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .2s}
.mb-play{background:var(--gold);color:#000;flex:1}.mb-play:hover{background:var(--gold2)}
.mb-list{background:var(--s3);color:var(--text)}.mb-list.on{background:var(--gold);color:#000}
.mb-wd{background:var(--s3);color:var(--text)}.mb-wd.on{background:var(--stage);color:#fff}
.m-provs{display:flex;gap:7px;flex-wrap:wrap}
.pbadge{display:flex;align-items:center;gap:5px;padding:5px 9px;border-radius:7px;background:var(--s2);font-size:12px;cursor:pointer;transition:background .2s}
.pbadge:hover{background:var(--s3)}
.plogo{width:20px;height:20px;border-radius:4px}
.cast-scroll{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.cast-scroll::-webkit-scrollbar{display:none}
.citem{flex-shrink:0;text-align:center;width:56px}
.cimg{width:56px;height:56px;border-radius:50%;object-fit:cover;background:var(--s3);margin-bottom:3px;display:block}
.cname{font-size:10px;color:var(--t2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sim-row{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.sim-row::-webkit-scrollbar{display:none}
.rat-row{display:flex;align-items:center;gap:8px;margin-top:12px}
.rat-lbl{font-size:12px;color:var(--t2)}
.stars{display:flex;gap:2px}
.star{font-size:24px;cursor:pointer;color:var(--s4);transition:color .1s}.star.on{color:var(--gold)}
#srch-ov{position:fixed;inset:0;background:rgba(6,8,16,.97);z-index:150;display:none;flex-direction:column;padding-top:env(safe-area-inset-top,0)}
#srch-ov.open{display:flex}
.srch-top{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--s3)}
.srch-inp{flex:1;background:var(--s2);border:1px solid var(--s3);color:var(--text);font-size:15px;padding:9px 13px;border-radius:8px;outline:none}
.srch-inp:focus{border-color:var(--gold)}.srch-inp::placeholder{color:var(--t3)}
.srch-cancel{background:transparent;border:none;color:var(--gold);font-size:14px;cursor:pointer;white-space:nowrap}
#srch-res{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:12px;padding:12px 14px}
@media(min-width:500px){.sgrid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr))}}
.ml-wrap{padding:12px 14px 0}
.ml-st{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px}
.ml-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:10px;margin-bottom:20px}
.set-wrap{padding:12px 14px 0}
.set-card{background:var(--s1);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--s2)}
.set-row:last-child{border-bottom:none}
.set-lbl{font-size:13px;font-weight:600}
.set-val{font-size:12px;color:var(--t2)}
.set-inp{width:100%;background:var(--s2);border:1px solid var(--s3);color:var(--text);font-size:12px;padding:8px 10px;border-radius:6px;outline:none;font-family:monospace;margin-bottom:8px}
.set-inp:focus{border-color:var(--gold)}
.set-btn{padding:8px 14px;border-radius:7px;border:none;background:var(--gold);color:#000;font-size:13px;font-weight:700;cursor:pointer}
.set-btn.d{background:var(--s3);color:var(--t2)}
.tgl{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tgl-sl{position:absolute;inset:0;background:var(--s4);border-radius:12px;transition:.3s;cursor:pointer}
.tgl-sl:before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
.tgl input:checked + .tgl-sl{background:var(--gold)}
.tgl input:checked + .tgl-sl:before{transform:translateX(20px)}
.quiz-ov{position:fixed;inset:0;background:rgba(6,8,16,.97);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.quiz-box{background:var(--s1);border-radius:16px;padding:24px 20px;max-width:420px;width:100%;max-height:88vh;overflow-y:auto}
.quiz-title{font-size:20px;font-weight:900;margin-bottom:5px;color:var(--gold)}
.quiz-sub{font-size:13px;color:var(--t2);margin-bottom:18px;line-height:1.5}
.quiz-step{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.chk-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.chk-item{padding:10px 8px;border-radius:8px;background:var(--s2);border:2px solid transparent;cursor:pointer;text-align:center;font-size:13px;transition:all .15s;-webkit-user-select:none;user-select:none}
.chk-item.on{border-color:var(--gold);background:rgba(201,162,39,.12);color:var(--gold);font-weight:700}
.quiz-btn{width:100%;padding:13px;border-radius:10px;border:none;background:var(--gold);color:#000;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.quiz-btn.sk{background:var(--s3);color:var(--t2);margin-top:8px;font-size:13px;padding:10px}
.empty{text-align:center;padding:50px 20px;color:var(--t2)}
.ei{font-size:44px;margin-bottom:10px}
.loading{display:flex;align-items:center;justify-content:center;padding:50px}
.spin{width:34px;height:34px;border:3px solid var(--s3);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <header id="hdr">
    <div id="logo"><span id="logo-icon">🎬</span><span id="logo-text">CINEMATCH</span></div>
    <div id="hdr-right"><button class="hdr-btn" onclick="openSrch()">🔍</button></div>
  </header>
  <div id="content">
    <div id="tab-home" class="tab-content active"></div>
    <div id="tab-mylist" class="tab-content"></div>
    <div id="tab-settings" class="tab-content"></div>
  </div>
  <nav id="bnav">
    <button class="nb on" onclick="goTab('home')" id="nb-home"><span class="ni">🏠</span><span>ホーム</span></button>
    <button class="nb" onclick="goTab('mylist')" id="nb-mylist"><span class="ni">❤️</span><span>マイリスト</span></button>
    <button class="nb" onclick="goTab('settings')" id="nb-settings"><span class="ni">⚙️</span><span>設定</span></button>
  </nav>
</div>
<div id="srch-ov">
  <div class="srch-top">
    <input id="srch-inp" class="srch-inp" type="search" placeholder="映画・アニメ・ドラマを検索..." oninput="onSrch(this.value)">
    <button class="srch-cancel" onclick="closeSrch()">キャンセル</button>
  </div>
  <div id="srch-res"><div class="empty"><div class="ei">🔍</div><div>作品を検索</div></div></div>
</div>
<div id="modal-ov" onclick="ovClick(event)">
  <div id="modal-box"><button id="m-close" onclick="closeModal()">✕</button><div id="modal-cnt"></div></div>
</div>
<div id="quiz-ov" class="quiz-ov" style="display:none">
  <div id="quiz-box" class="quiz-box"></div>
</div>
<script>
var KEY='e051152fe4661315d4510279a1778530';
var BASE='https://api.themoviedb.org/3';
var JIKAN='https://api.jikan.moe/v4';
var IW='https://image.tmdb.org/t/p/w342';
var IB='https://image.tmdb.org/t/p/w780';
var IO='https://image.tmdb.org/t/p/original';
var IF='https://image.tmdb.org/t/p/w138_and_h175_face';
var EXCL_GENRES='27|35|36|99|10752|10402';
var SVC_SEARCH={'U-NEXT':'https://video.unext.jp/search?query=','Amazon Prime Video':'https://www.amazon.co.jp/s?i=instant-video&k=','Prime Video':'https://www.amazon.co.jp/s?i=instant-video&k=','Netflix':'https://www.netflix.com/search?q=','Hulu':'https://www.hulu.jp/search#','Disney Plus':'https://www.disneyplus.com/search/'};
var PROV_IDS={unext:'39',prime:'9|119',nflx:'8|213',hulu:'11',disney:'337'};
var PROV_LINK={
  39: {search:'https://video.unext.jp/search?query=',          store:'https://apps.apple.com/jp/app/u-next/id370966917'},
  9:  {search:'https://www.primevideo.com/search/?phrase=',    store:'https://apps.apple.com/jp/app/prime-video/id545519333'},
  119:{search:'https://www.primevideo.com/search/?phrase=',    store:'https://apps.apple.com/jp/app/prime-video/id545519333'},
  8:  {search:'https://www.netflix.com/search?q=',             store:'https://apps.apple.com/jp/app/netflix/id363590051'},
  213:{search:'https://www.netflix.com/search?q=',             store:'https://apps.apple.com/jp/app/netflix/id363590051'},
  11: {search:'https://www.hulu.jp/search?q=',                 store:'https://apps.apple.com/jp/app/hulu/id354363137'},
  337:{search:'https://www.disneyplus.com/search/',            store:'https://apps.apple.com/jp/app/disney/id1446075923'}
};
var S={myList:[],watched:[],ratings:{},pc:{},hi:[],hx:0,ht:null,st:null,genreMap:{},prefs:{genres:[28,878,53,9648,16],services:['unext','prime'],setup:false}};
var qSvc=[],qGenres=[];

function loadSt(){
  try{S.myList=JSON.parse(localStorage.getItem('cm_l')||'[]')}catch(e){}
  try{S.watched=JSON.parse(localStorage.getItem('cm_w')||'[]')}catch(e){}
  try{S.ratings=JSON.parse(localStorage.getItem('cm_r')||'{}')}catch(e){}
  try{S.genreMap=JSON.parse(localStorage.getItem('cm_gm')||'{}')}catch(e){}
  try{
    var p=JSON.parse(localStorage.getItem('cm_prefs')||'{}');
    if(p.genres)S.prefs.genres=p.genres;
    if(p.services)S.prefs.services=p.services;
    else if(p.hideNflx!==undefined){S.prefs.services=['unext','prime'];if(!p.hideNflx)S.prefs.services.push('nflx');}
    if(p.setup!==undefined)S.prefs.setup=p.setup;
  }catch(e){}
  var k=localStorage.getItem('cm_key');if(k)KEY=k;
}
function saveL(){localStorage.setItem('cm_l',JSON.stringify(S.myList))}
function saveW(){localStorage.setItem('cm_w',JSON.stringify(S.watched))}
function saveR(){localStorage.setItem('cm_r',JSON.stringify(S.ratings))}
function saveP(){try{localStorage.setItem('cm_prefs',JSON.stringify(S.prefs));}catch(e){}}
function saveGM(){try{localStorage.setItem('cm_gm',JSON.stringify(S.genreMap));}catch(e){}}

function getGenreWeights(){
  var w={};
  (S.prefs.genres||[]).forEach(function(g){w[g]=(w[g]||0)+3;});
  Object.keys(S.ratings).forEach(function(id){
    var r=S.ratings[id];
    (S.genreMap[id]||[]).forEach(function(g){w[g]=(w[g]||0)+(r-2.5)*2;});
  });
  S.watched.forEach(function(id){
    (S.genreMap[String(id)]||[]).forEach(function(g){w[g]=(w[g]||0)+0.5;});
  });
  return w;
}
function getTopGenreStr(n){
  var w=getGenreWeights();
  var top=Object.keys(w).filter(function(g){return w[g]>0;}).sort(function(a,b){return w[b]-w[a];}).slice(0,n||5);
  return top.length?top.join('|'):'28|878|53|9648|16';
}
function getSubProvStr(){
  var parts=[];
  var svcs=S.prefs.services||['unext','prime'];
  for(var i=0;i<svcs.length;i++){if(PROV_IDS[svcs[i]])parts.push(PROV_IDS[svcs[i]]);}
  return parts.length?parts.join('|'):'39|9|119';
}
function secVisible(s){
  if(!s.svcKey)return true;
  return (S.prefs.services||[]).indexOf(s.svcKey)!==-1;
}

function tmdb(path,p){
  var url=BASE+path+'?api_key='+KEY+'&language=ja-JP';
  if(p){var ks=Object.keys(p);for(var i=0;i<ks.length;i++)if(p[ks[i]]!=null)url+='&'+ks[i]+'='+encodeURIComponent(p[ks[i]]);}
  return fetch(url).then(function(r){if(!r.ok)throw new Error(r.status);return r.json();});
}
function jk(path){return fetch(JIKAN+path).then(function(r){if(!r.ok)throw new Error(r.status);return r.json();})}
function getProv(id,type){
  var ck=(type||'movie')+'_'+id;
  if(S.pc[ck]!==undefined)return Promise.resolve(S.pc[ck]);
  var ep=type==='tv'?'/tv/':'/movie/';
  return tmdb(ep+id+'/watch/providers').then(function(d){var jp=((d.results||{}).JP)||{};var all=(jp.flatrate||[]).concat(jp.free||[]);var res={providers:all,link:jp.link||null};S.pc[ck]=res;return res;}).catch(function(){var res={providers:[],link:null};S.pc[ck]=res;return res;});
}
function getTrl(id,type){
  var ep=(type==='tv'?'/tv/':'/movie/')+id+'/videos';
  return tmdb(ep).then(function(d){var v=(d.results||[]).filter(function(x){return x.site==='YouTube'&&(x.type==='Trailer'||x.type==='Teaser');});return v.length?v[0].key:null;}).catch(function(){return null;});
}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function openSvc(name,title){var b=SVC_SEARCH[name];window.open(b?b+encodeURIComponent(title):'https://www.google.com/search?q='+encodeURIComponent(name+' '+title+' 視聴'),'_blank');}

function goTab(t){
  document.querySelectorAll('.tab-content').forEach(function(e){e.classList.remove('active');});
  document.querySelectorAll('.nb').forEach(function(e){e.classList.remove('on');});
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('nb-'+t).classList.add('on');
  if(t==='mylist')renderML();
  if(t==='settings')renderSet();

function loadHero(){
  Promise.all([tmdb('/trending/movie/week'),tmdb('/movie/now_playing',{region:'JP'})]).then(function(r){
    var items=[];
    (r[0].results||[]).slice(0,5).forEach(function(m){items.push({m:m,b:'r'});});
    (r[1].results||[]).slice(0,4).forEach(function(m){items.push({m:m,b:'t'});});
    items.sort(function(){return Math.random()-.5;});
    S.hi=items.slice(0,6);S.hx=0;drawHero(0);
    if(S.ht)clearInterval(S.ht);
    S.ht=setInterval(function(){S.hx=(S.hx+1)%S.hi.length;drawHero(S.hx);},5500);
  }).catch(function(){});
}

  var wrap=document.getElementById('hero-wrap');if(!wrap||!S.hi.length)return;

  var title=m.title||m.name||'';var year=(m.release_date||m.first_air_date||'').slice(0,4);
  var rat=m.vote_average?m.vote_average.toFixed(1):'';var saved=S.myList.indexOf(m.id)!==-1;var isT=e.b==='t';

  h+='<div class="htitle">'+esc(title)+'</div><div class="hmeta">';

  h+='</div><div class="hbtns">';
  h+='<button class="hbtn hbtn-p" onclick="hTrl('+m.id+')">▶ 予告編</button>';
  h+='<button class="hbtn hbtn-i" onclick="openModal('+m.id+',\'movie\')">詳細</button>';
  h+='<button class="hbtn-w" style="color:'+(saved?'var(--gold)':'#fff')+'" onclick="hWL(event,'+m.id+')">'+(saved?'♥':'♡')+'</button>';

function fill(sec,items,type){
  var el=document.getElementById('sec-'+sec.id);if(!el)return;

  var isPick=sec.id==='pick';
  var h='<div class="sec-hdr"><span class="sec-title">'+sec.title+'</span>';
  if(isPick)h+='<span class="sec-action" onclick="openQ()">好みを変更</span>';
  h+='</div><div class="row">';
  for(var i=0;i<items.length;i++)h+=mkCard(items[i],type||'movie');
  h+='</div>';el.innerHTML=h;
}

function cqwTonightC(e,id){
  e.stopPropagation();
  var i=S.watched.indexOf(id);
  if(i===-1){
    S.watched.push(id);
    if(!S.genreMap[String(id)]){
      tmdb('/movie/'+id).then(function(d){if(d.genres){S.genreMap[String(id)]=d.genres.map(function(g){return g.id;});saveGM();}}).catch(function(){});
    }
  } else S.watched.splice(i,1);
  saveW();
  var on=S.watched.indexOf(id)!==-1;
  var b=document.getElementById('tonight-wd');
  if(b)b.innerHTML=on?'✅ 視聴済':'👁 視聴済';
}

function mkCard(item,type){

  var id,title,poster,year,rat;
  if(isA){id='anime_'+item.mal_id;title=item.title_japanese||item.title;poster=(item.images&&item.images.jpg)?item.images.jpg.large_image_url:'';year=item.year||'';rat=item.score?item.score.toFixed(1):'';}
  else{id=item.id;title=item.title||item.name||item.original_title||'';poster=item.poster_path?(IW+item.poster_path):'';year=(item.release_date||item.first_air_date||'').slice(0,4);rat=item.vote_average?item.vote_average.toFixed(1):'';}
  var saved=!isA&&S.myList.indexOf(id)!==-1;
  var watched=!isA&&S.watched.indexOf(id)!==-1;
  var tid=isA?'anime':(isTV?'tv':'movie');

    h+='<button class="cwl'+(saved?' on':'')+'" onclick="cwlC(event,'+id+')">'+(saved?'♥':'♡')+'</button>';
  }

  var svcs=[{id:'unext',lbl:'📺 U-NEXT'},{id:'prime',lbl:'▶ Amazon Prime'},{id:'nflx',lbl:'🎥 Netflix'},{id:'hulu',lbl:'📺 Hulu'},{id:'disney',lbl:'✨ Disney+'}];
  var gens=[{id:28,lbl:'アクション'},{id:878,lbl:'SF'},{id:53,lbl:'スリラー'},{id:9648,lbl:'ミステリー'},{id:16,lbl:'アニメーション'},{id:35,lbl:'コメディ'},{id:18,lbl:'ドラマ'},{id:10749,lbl:'ロマンス'},{id:12,lbl:'冒険'},{id:14,lbl:'ファンタジー'},{id:80,lbl:'犯罪'},{id:36,lbl:'歴史'}];
  var h='<div class="quiz-title">🎬 CineMatch</div>';
  h+='<div class="quiz-sub">加入中のサービスとお好みのジャンルを選んでください</div>';
  h+='<div class="quiz-step">① 加入している配信サービス（イチオシ選別に使用）</div>';
  h+='<div class="chk-grid">';
  svcs.forEach(function(s){h+='<div class="chk-item'+(qSvc.indexOf(s.id)!==-1?' on':'')+'" onclick="tqSvc(this,\''+s.id+'\')">'+s.lbl+'</div>';});
  h+='</div>';
  h+='<div class="quiz-step">② 好きなジャンル（複数選択可）</div>';
  h+='<div class="chk-grid">';
  gens.forEach(function(g){h+='<div class="chk-item'+(qGenres.indexOf(g.id)!==-1?' on':'')+'" onclick="tqG(this,'+g.id+')">'+g.lbl+'</div>';});
  h+='</div>';
  h+='<button class="quiz-btn" onclick="finishQ()">✓ 保存してイチオシを更新</button>';
  h+='<button class="quiz-btn sk" onclick="document.getElementById(\'quiz-ov\').style.display=\'none\'">スキップ</button>';
  document.getElementById('quiz-box').innerHTML=h;
}
function tqSvc(el,id){var i=qSvc.indexOf(id);if(i===-1){qSvc.push(id);el.classList.add('on');}else{qSvc.splice(i,1);el.classList.remove('on');}}
function tqG(el,id){var i=qGenres.indexOf(id);if(i===-1){qGenres.push(id);el.classList.add('on');}else{qGenres.splice(i,1);el.classList.remove('on');}}
function finishQ(){
  S.prefs.services=qSvc.slice();
  S.prefs.genres=qGenres.slice();
  S.prefs.setup=true;
  saveP();
  document.getElementById('quiz-ov').style.display='none';
  loadHome();
}

loadSt();
if(!S.prefs.setup){setTimeout(function(){renderQ();document.getElementById('quiz-ov').style.display='flex';},800);}
loadHome();
</script>
